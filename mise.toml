[env]

[tools]
go = "1.26.3"

[tasks.graphify]
description = "Build knowledge graph"
run = "poetry run graphify ."

[tasks.build]
description = "Build native binary"
run = """
go build -ldflags="-s -w" -o chirashi .
"""

[tasks.test]
description = "Run Go test suite"
run = "go test ./..."

[tasks.build-release]
description = "Build release archives for all platforms"
run = """
VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
LDFLAGS="-s -w -X github.com/g-lok/chirashi/cmd.version=$VERSION"
mkdir -p build/releases

echo "=== macOS amd64 ==="
CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/releases/chirashi-$VERSION-darwin-amd64/chirashi .
cd build/releases && tar czf chirashi-$VERSION-darwin-amd64.tar.gz chirashi-$VERSION-darwin-amd64/ && rm -rf chirashi-$VERSION-darwin-amd64 && cd ../..

echo "=== macOS arm64 ==="
CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/releases/chirashi-$VERSION-darwin-arm64/chirashi .
cd build/releases && tar czf chirashi-$VERSION-darwin-arm64.tar.gz chirashi-$VERSION-darwin-arm64/ && rm -rf chirashi-$VERSION-darwin-arm64 && cd ../..

echo "=== Linux amd64 ==="
CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/releases/chirashi-$VERSION-linux-amd64/chirashi .
cd build/releases && tar czf chirashi-$VERSION-linux-amd64.tar.gz chirashi-$VERSION-linux-amd64/ && rm -rf chirashi-$VERSION-linux-amd64 && cd ../..

echo "=== Linux arm64 ==="
CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/releases/chirashi-$VERSION-linux-arm64/chirashi .
cd build/releases && tar czf chirashi-$VERSION-linux-arm64.tar.gz chirashi-$VERSION-linux-arm64/ && rm -rf chirashi-$VERSION-linux-arm64 && cd ../..

echo "=== Windows amd64 ==="
CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/releases/chirashi-$VERSION-windows-amd64/chirashi.exe .
cd build/releases && zip -r chirashi-$VERSION-windows-amd64.zip chirashi-$VERSION-windows-amd64/ && rm -rf chirashi-$VERSION-windows-amd64 && cd ../..

echo "=== Done ==="
ls -lh build/releases/
"""
