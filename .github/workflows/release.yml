name: Release

on:
  push:
    tags: ["v*"]

env:
  VERSION: ${{ github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        env:
          LDFLAGS: "-s -w -X github.com/g-lok/chirashi/cmd.version=${{ env.VERSION }}"
        run: |
          mkdir -p build/releases
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="$LDFLAGS" \
            -o "build/releases/chirashi-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}/chirashi${{ matrix.ext }}" .

      - name: Package
        run: |
          cd build/releases
          ARCHIVE="chirashi-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = windows ]; then
            zip -r "$ARCHIVE.zip" "$ARCHIVE/"
          else
            tar czf "$ARCHIVE.tar.gz" "$ARCHIVE/"
          fi

      - name: Checksums
        run: |
          cd build/releases
          sha256sum *.* >> CHECKSUMS.txt

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: build/releases/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
